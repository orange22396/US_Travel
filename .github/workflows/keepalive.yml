name: Supabase Keepalive

on:
  schedule:
    - cron: "0 9 * * *"   # 每天 UTC 09:00 = 台灣時間 17:00
  workflow_dispatch:       # 可以手動觸發測試

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keepalive endpoint
        run: |
          curl -f https://us-travel-omega.vercel.app/api/keepalive
